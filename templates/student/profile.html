{% extends 'base.html' %}

{% block content %}
<h3>Update Student Profile</h3>

<form method="POST" style="border: 1px solid #ccc; padding: 20px; width: 400px;">
    <p>
        <label>Full Name:</label><br>
        <input type="text" name="name" value="{{ student.name }}" required>
    </p>
    <p><label>Email Address:</label><br>
        <input type="email" value="{{ student.email }}" disabled>
    </p>
    <p>
        <label>Branch:</label><br>
        <input type="text" name="branch" value="{{ student.branch }}" required>
    </p>
    <p>
        <label>CGPA:</label><br>
        <input type="number" step="0.01" name="cgpa" value="{{ student.cgpa }}" required>
    </p>
    <p>
        <label>Resume Link (Google Drive Link):</label><br>
        <input type="url" name="resume" value="{{ student.resume or '' }}">
    </p>

    <input type="submit" value="Update">
</form>

<br>
<a href="/student">Go back</a>
{% endblock %}
