{% extends 'base.html' %}

{% block content %}
<h3>Edit Placement Drive</h3>

<form method="POST" style="border: 1px solid #ccc; padding: 20px; width: 400px;">
    <p>
        <label>Job Title:</label><br>
        <input type="text" name="title" value="{{ drive.title }}" required>
    </p>
    <p>
        <label>Job Description:</label><br>
        <textarea name="job_description" rows="4" cols="40">{{ drive.job_description }}</textarea>
    </p>
    <p>
        <label>Eligibility Criteria:</label><br>
        <textarea name="eligibility_criteria" rows="3" cols="40">{{ drive.eligibility_criteria }}</textarea>
    </p>
    <p>
        <label>Application Deadline:</label><br>
        <input type="date" name="deadline" value="{{ drive.deadline.strftime('%Y-%m-%d') if drive.deadline else '' }}" required>
    </p>
    <input type="submit" value="Update Drive">
</form>
<br>
<a href="{{ url_for('company_dashboard') }}">Cancel and go back</a>
{% endblock %}
