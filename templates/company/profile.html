{% extends 'base.html' %}

{% block content %}
<h3>Update Profile</h3>

<form method="POST" style="border: 1px solid #ccc; padding: 20px; width: 400px;">
    <p>
        <label>Company Name:</label><br>
        <input type="text" name="name" value="{{ company.name }}" required>
    </p>
    <p><label>Email:</label><br>
        <input type="email" value="{{ company.email }}" disabled>
    </p>
    <p>
        <label>Industry:</label><br>
        <input type="text" name="idy" value="{{ company.industry }}" required>
    </p>
    <p>
        <label>HR Contact:</label><br>
        <input type="text" name="hr" value="{{ company.hr }}" required>
    </p>
    <p>
        <label>Website:</label><br>
        <input type="url" name="site" value="{{ company.site or '' }}">
    </p>

    <input type="submit" value="Update">
</form>

<br>
<a href="/company">Go back</a>
{% endblock %}
