{% extends 'base.html' %}

{% block content %}
<h3>Company Registration Form</h3>
<form method="POST" style="border: 1px solid #ccc; padding: 20px; width: 350px;">
    <p>
        <label>Company Name:</label><br>
        <input type="text" name="name" required>
    </p>
    <p>
        <label>Email Address:</label><br>
        <input type="email" name="email" required>
    </p>
    <p>
        <label>Password:</label><br>
        <input type="password" name="password" required>
    </p>
    <p>
        <label>Industry Type:</label><br>
        <input type="text" name="industry" required>
    </p>
    <p>
        <label>HR Contact Info:</label><br>
        <input type="text" name="hr_contact" required>
    </p>
    <p>
        <label>Company Website:</label><br>
        <input type="url" name="website">
    </p>
    <input type="submit" value="Register as Company">
</form>
<br>
<p>Already registered? <a href="{{ url_for('login') }}">Go to Login</a></p>
{% endblock %}
